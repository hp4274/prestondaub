<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var isLiveServer = window.location.port !== '';
            var apiEndpoint = isLiveServer 
                ? window.location.protocol + '//' + window.location.hostname + '/prestondaub/admin/api-maintenance-status.php'
                : './admin/api-maintenance-status.php';
            fetch(apiEndpoint)
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data && !data.maintenance_mode) {
                        window.location.href = './index.html';
                    }
                })
                .catch(function(err) { console.warn('Maintenance check bypass:', err); });
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preston Daub - Under Maintenance</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-color: #ffffff;
            --text-primary: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-color: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .maintenance-card {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            padding: 48px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--accent-color);
            margin-bottom: 32px;
        }

        .brand-logo span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background-color: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            position: relative;
        }

        .icon-container i {
            font-size: 32px;
            color: var(--accent-color);
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            animation: pulse 2s infinite ease-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 1;
            }
            100% {
                transform: scale(1.35);
                opacity: 0;
            }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .loader-bar {
            width: 100%;
            height: 4px;
            background-color: #f1f5f9;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 36px;
        }

        .loader-fill {
            height: 100%;
            width: 50%;
            background-color: var(--accent-color);
            border-radius: 2px;
            animation: loading 1.5s infinite ease-in-out;
        }

        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(200%);
            }
        }

        .contact-info {
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .contact-info a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .contact-info a:hover {
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <div class="brand-logo">
            Preston<span>Daub</span>
        </div>

        <div class="icon-container">
            <div class="pulse-ring"></div>
            <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>

        <h1>Pardon Our Dust</h1>
        <p>Our digital space is undergoing planned maintenance to upgrade services. We will be back online shortly. Thank you for your patience.</p>

        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>

        <div class="contact-info">
            <span>Need immediate support?</span>
            <a href="mailto:info@prestondaub.com">
                <i class="fa-solid fa-envelope" style="margin-right: 6px;"></i>info@prestondaub.com
            </a>
        </div>
    </div>
</body>
</html>
