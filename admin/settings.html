<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Settings - Preston Daub</title>
  <link rel="icon" type="image/png" href="../assets/img/logo/favicon.png">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #111827; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 20px; }
    .btn { border: 1px solid #d1d5db; background: white; border-radius: 10px; padding: 10px 12px; font-size: 14px; cursor: pointer; font-weight: 600; }
    .message { margin-bottom: 16px; padding: 12px 14px; border-radius: 12px; display: none; }
    .message.show { display: block; }
    .message.error { background: #fef2f2; color: #991b1b; }
    .message.success { background: #ecfdf5; color: #065f46; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 style="margin:0 0 6px;">Settings</h1>
        <div id="sessionText" style="color:#6b7280;">Checking admin session...</div>
      </div>
      <div style="display:flex; gap:12px;">
        <a href="./dashboard.html" class="btn" style="text-decoration:none; color:inherit;">Dashboard</a>
        <a href="./team.html" class="btn" style="text-decoration:none; color:inherit;">Team</a>
        <a href="./profile.html" class="btn" style="text-decoration:none; color:inherit;">Profile</a>
      </div>
    </div>
    <div id="message" class="message"></div>
    <div class="card">
      <h2 style="margin-top:0;">Global Settings</h2>
      <label style="display:flex; align-items:center; gap:10px; font-weight:600; margin-bottom:16px;">
        <input id="teamModuleInput" type="checkbox">
        Team module enabled
      </label>
      <p style="color:#6b7280; margin:0 0 16px;">Controls whether the public team section is enabled.</p>
      <button id="saveBtn" class="btn" type="button">Save Settings</button>
    </div>
  </div>
  <script src="assets/js/api-base.js"></script>
  <script src="assets/js/admin-settings.js"></script>
</body>
</html>
