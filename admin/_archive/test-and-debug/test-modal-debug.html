<!DOCTYPE html>
<html>
<head>
    <title>Modal Debug Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .btn {
            padding: 10px 20px;
            background: #0b0ea8;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background: #080a7a;
        }
        .debug-output {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border: 1px solid #999;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Modal System Debug Test</h1>
    
    <div class="test-section">
        <h2>Test 1: Basic Modal Creation</h2>
        <button class="btn" onclick="testBasicModal()">Test Modal Creation</button>
        <div class="debug-output" id="debug1"></div>
    </div>

    <div class="test-section">
        <h2>Test 2: CSS Injection</h2>
        <button class="btn" onclick="testCSSInjection()">Test CSS Injection</button>
        <div class="debug-output" id="debug2"></div>
    </div>

    <div class="test-section">
        <h2>Test 3: Animation Classes</h2>
        <button class="btn" onclick="testAnimationClasses()">Test Animation Classes</button>
        <div class="debug-output" id="debug3"></div>
    </div>

    <div class="test-section">
        <h2>Test 4: Z-Index Check</h2>
        <button class="btn" onclick="testZIndex()">Check Z-Index</button>
        <div class="debug-output" id="debug4"></div>
    </div>

    <script>
        // Add CSS from form-modal.js
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideUp {
                from {
                    transform: translateY(100px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            @keyframes slideDown {
                from {
                    transform: translateY(0);
                    opacity: 1;
                }
                to {
                    transform: translateY(100px);
                    opacity: 0;
                }
            }

            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }

            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
                display: none;
                animation: fadeIn 0.3s ease;
                backdrop-filter: blur(4px);
            }

            .modal-overlay.active {
                display: block;
            }

            .modal-sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: 420px;
                background: white;
                box-shadow: -4px 0 12px rgba(0, 0, 0, 0.15);
                z-index: 1000;
                display: flex;
                flex-direction: column;
                transform: translateX(420px);
                transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
                overflow-y: auto;
            }

            .modal-sidebar.active {
                transform: translateX(0);
            }

            .modal-header {
                padding: 20px;
                border-bottom: 1px solid #e5e7eb;
                background: #f9fafb;
            }

            .modal-title {
                margin: 0;
                font-size: 18px;
                font-weight: 700;
            }

            .modal-content {
                flex: 1;
                overflow-y: auto;
            }

            @media (max-width: 768px) {
                .modal-sidebar {
                    width: 100%;
                    transform: translateX(100%);
                }

                .modal-sidebar.active {
                    transform: translateX(0);
                }
            }
        `;
        document.head.appendChild(style);

        function log(id, msg) {
            const el = document.getElementById(id);
            el.innerHTML += msg + '\n';
        }

        function testBasicModal() {
            const debugId = 'debug1';
            document.getElementById(debugId).innerHTML = '';
            
            log(debugId, '[Test] Creating overlay and sidebar...');
            
            let overlay = document.getElementById('formModalOverlay');
            if (overlay) {
                log(debugId, '[✓] Overlay already exists');
            } else {
                overlay = document.createElement('div');
                overlay.id = 'formModalOverlay';
                overlay.className = 'modal-overlay';
                overlay.style.background = 'rgba(0, 0, 0, 0.5)';
                document.body.appendChild(overlay);
                log(debugId, '[✓] Overlay created');
            }

            let sidebar = document.getElementById('formModalSidebar');
            if (sidebar) {
                log(debugId, '[✓] Sidebar already exists');
            } else {
                sidebar = document.createElement('div');
                sidebar.id = 'formModalSidebar';
                sidebar.className = 'modal-sidebar';
                sidebar.innerHTML = '<div class="modal-header"><h2 class="modal-title">Test Modal</h2></div><div class="modal-content"><p>Modal content test</p></div>';
                document.body.appendChild(sidebar);
                log(debugId, '[✓] Sidebar created');
            }

            log(debugId, '[Test] Setting display and classes...');
            overlay.style.display = 'block';
            overlay.classList.add('active');
            sidebar.classList.add('active');
            
            log(debugId, '[✓] Display set and active classes added');
            log(debugId, '[Check] Overlay display: ' + window.getComputedStyle(overlay).display);
            log(debugId, '[Check] Overlay z-index: ' + window.getComputedStyle(overlay).zIndex);
            log(debugId, '[Check] Sidebar transform: ' + window.getComputedStyle(sidebar).transform);
            log(debugId, '[Check] Sidebar z-index: ' + window.getComputedStyle(sidebar).zIndex);
        }

        function testCSSInjection() {
            const debugId = 'debug2';
            document.getElementById(debugId).innerHTML = '';
            
            log(debugId, '[Test] Checking CSS rules...');
            
            const sheets = document.styleSheets;
            let foundOverlay = false;
            let foundSidebar = false;
            
            for (let i = 0; i < sheets.length; i++) {
                try {
                    const rules = sheets[i].cssRules;
                    for (let j = 0; j < rules.length; j++) {
                        const rule = rules[j];
                        if (rule.selectorText && rule.selectorText.includes('modal-overlay')) {
                            foundOverlay = true;
                            log(debugId, '[✓] Found .modal-overlay rule: ' + rule.selectorText);
                        }
                        if (rule.selectorText && rule.selectorText.includes('modal-sidebar')) {
                            foundSidebar = true;
                            log(debugId, '[✓] Found .modal-sidebar rule: ' + rule.selectorText);
                        }
                    }
                } catch (e) {
                    // CORS protected stylesheets
                }
            }
            
            if (!foundOverlay) log(debugId, '[✗] .modal-overlay CSS rule NOT found');
            if (!foundSidebar) log(debugId, '[✗] .modal-sidebar CSS rule NOT found');
        }

        function testAnimationClasses() {
            const debugId = 'debug3';
            document.getElementById(debugId).innerHTML = '';
            
            log(debugId, '[Test] Creating test elements for animation...');
            
            const overlay = document.getElementById('formModalOverlay');
            const sidebar = document.getElementById('formModalSidebar');
            
            if (!overlay || !sidebar) {
                log(debugId, '[✗] Elements not found. Run Test 1 first.');
                return;
            }
            
            log(debugId, '[Check] Overlay classes: ' + overlay.className);
            log(debugId, '[Check] Sidebar classes: ' + sidebar.className);
            
            log(debugId, '[Test] Removing active classes...');
            overlay.classList.remove('active');
            sidebar.classList.remove('active');
            log(debugId, '[✓] Overlay classes after removal: ' + overlay.className);
            log(debugId, '[✓] Sidebar classes after removal: ' + sidebar.className);
            
            setTimeout(() => {
                log(debugId, '[Test] Re-adding active classes...');
                overlay.classList.add('active');
                sidebar.classList.add('active');
                log(debugId, '[✓] Overlay classes after re-add: ' + overlay.className);
                log(debugId, '[✓] Sidebar classes after re-add: ' + sidebar.className);
            }, 1000);
        }

        function testZIndex() {
            const debugId = 'debug4';
            document.getElementById(debugId).innerHTML = '';
            
            const overlay = document.getElementById('formModalOverlay');
            const sidebar = document.getElementById('formModalSidebar');
            
            if (!overlay || !sidebar) {
                log(debugId, '[✗] Elements not found. Run Test 1 first.');
                return;
            }
            
            const overlayStyle = window.getComputedStyle(overlay);
            const sidebarStyle = window.getComputedStyle(sidebar);
            
            log(debugId, '[Check] Overlay z-index: ' + overlayStyle.zIndex + ' (expected: 999)');
            log(debugId, '[Check] Sidebar z-index: ' + sidebarStyle.zIndex + ' (expected: 1000)');
            log(debugId, '[Check] Overlay position: ' + overlayStyle.position + ' (expected: fixed)');
            log(debugId, '[Check] Sidebar position: ' + sidebarStyle.position + ' (expected: fixed)');
            
            if (overlayStyle.zIndex < sidebarStyle.zIndex) {
                log(debugId, '[✓] Z-index order is correct (overlay < sidebar)');
            } else {
                log(debugId, '[✗] Z-index order is WRONG');
            }
        }
    </script>
</body>
</html>
