<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Forms - Preston Daub</title>
  <link rel="icon" type="image/png" href="../assets/img/logo/favicon.png">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #111827; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .topbar, .filters { display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .topbar { margin-bottom: 20px; }
    .filters { margin-bottom: 20px; align-items: center; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab, .btn {
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .tab.active { background: #0b0ea8; color: white; border-color: #0b0ea8; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; }
    select, input {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: white;
    }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 18px; }
    .label { font-size: 12px; text-transform: uppercase; color: #6b7280; font-weight: 700; margin-bottom: 8px; }
    .value { font-size: 30px; font-weight: 800; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; }
    th, td { text-align: left; padding: 14px 16px; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
    th { background: #f8fafc; font-size: 12px; text-transform: uppercase; color: #6b7280; }
    .status, .priority {
      display: inline-block; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 700;
    }
    .status.new { background: #dbeafe; color: #1d4ed8; }
    .status.read { background: #dcfce7; color: #166534; }
    .status.spam { background: #fee2e2; color: #b91c1c; }
    .priority.high { background: #fee2e2; color: #b91c1c; }
    .priority.medium { background: #fef3c7; color: #92400e; }
    .priority.low { background: #dcfce7; color: #166534; }
    .row-actions { display: flex; gap: 8px; }
    .row-btn {
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .pager { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; gap: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 style="margin:0 0 6px;">Submissions</h1>
        <div id="sessionText" style="color:#6b7280;">Checking admin session...</div>
      </div>
      <div style="display:flex; gap:12px;">
        <a href="./dashboard.html" class="btn" style="text-decoration:none; color:inherit;">Dashboard</a>
        <a href="./profile.html" class="btn" style="text-decoration:none; color:inherit;">Profile</a>
        <a href="./settings.html" class="btn" style="text-decoration:none; color:inherit;">Settings</a>
        <a href="./logout.html" class="btn" style="text-decoration:none; color:inherit;">Logout</a>
      </div>
    </div>

    <div class="filters">
      <div class="tabs" id="moduleTabs"></div>
      <div class="controls">
        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="new">New</option>
          <option value="read">Read</option>
          <option value="spam">Spam</option>
        </select>
        <input id="searchInput" type="search" placeholder="Search name or email">
        <button class="btn" id="searchBtn">Apply</button>
      </div>
    </div>

    <div class="stats">
      <div class="card"><div class="label">Total</div><div class="value" id="statTotal">0</div></div>
      <div class="card"><div class="label">New</div><div class="value" id="statNew">0</div></div>
      <div class="card"><div class="label">Read</div><div class="value" id="statRead">0</div></div>
      <div class="card"><div class="label">Spam</div><div class="value" id="statSpam">0</div></div>
    </div>

    <div class="card" style="padding:0;">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Type</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Submitted</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="formsTable">
          <tr><td colspan="7">Loading submissions...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pager">
      <button class="btn" id="prevBtn">Previous</button>
      <div id="pageInfo">Page 1</div>
      <button class="btn" id="nextBtn">Next</button>
    </div>
  </div>
  <script src="assets/js/api-base.js"></script>
  <script src="assets/js/admin-forms.js"></script>
</body>
</html>
