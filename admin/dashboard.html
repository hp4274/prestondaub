<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Preston Daub</title>
  <link rel="icon" type="image/png" href="../assets/img/logo/favicon.png">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .actions {
      display: flex;
      gap: 12px;
    }
    .btn {
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
    }
    .label {
      font-size: 12px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .value {
      font-size: 30px;
      font-weight: 800;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
    }
    th {
      background: #f8fafc;
      font-size: 12px;
      text-transform: uppercase;
      color: #6b7280;
    }
    .status {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .status.new { background: #dbeafe; color: #1d4ed8; }
    .status.read { background: #dcfce7; color: #166534; }
    .status.spam { background: #fee2e2; color: #b91c1c; }
    .quick-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 style="margin:0 0 6px;">Dashboard</h1>
        <div id="welcomeText" style="color:#6b7280;">Loading admin session...</div>
      </div>
      <div class="actions">
        <a href="./profile.html" class="btn" style="text-decoration:none; color:inherit;">Profile</a>
        <a href="./settings.html" class="btn" style="text-decoration:none; color:inherit;">Settings</a>
        <button class="btn" id="refreshBtn">Refresh</button>
        <a href="./logout.html" class="btn" style="text-decoration:none; color:inherit;">Logout</a>
      </div>
    </div>

    <div class="stats">
      <div class="card"><div class="label">Total Submissions</div><div class="value" id="statTotal">0</div></div>
      <div class="card"><div class="label">New</div><div class="value" id="statNew">0</div></div>
      <div class="card"><div class="label">Read</div><div class="value" id="statRead">0</div></div>
      <div class="card"><div class="label">Spam</div><div class="value" id="statSpam">0</div></div>
      <div class="card"><div class="label">News Articles</div><div class="value" id="statNews">0</div></div>
    </div>

    <div class="quick-links">
      <a class="quick-link" href="./forms.html"><div class="card"><div class="label">Manage</div><div class="value" style="font-size:22px;">Forms</div></div></a>
      <a class="quick-link" href="./news.html"><div class="card"><div class="label">Manage</div><div class="value" style="font-size:22px;">News</div></div></a>
      <a class="quick-link" href="./team.html"><div class="card"><div class="label">Manage</div><div class="value" style="font-size:22px;">Team</div></div></a>
    </div>

    <div class="card" style="padding:0;">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Type</th>
            <th>Status</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="recentFormsTable">
          <tr><td colspan="5">Loading recent submissions...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script src="assets/js/api-base.js"></script>
  <script src="assets/js/admin-dashboard.js"></script>
</body>
</html>
