<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Editor - Preston Daub</title>
  <link rel="icon" type="image/png" href="../assets/img/logo/favicon.png">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #111827; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .btn, input, textarea, select {
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .btn { cursor: pointer; font-weight: 600; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #374151; }
    input, textarea, select { width: 100%; }
    textarea { min-height: 120px; }
    #contentInput { min-height: 320px; }
    .message { margin-bottom: 16px; padding: 12px 14px; border-radius: 12px; display: none; }
    .message.show { display: block; }
    .message.error { background: #fef2f2; color: #991b1b; }
    .message.success { background: #ecfdf5; color: #065f46; }
    .category-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .category-row button { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 id="pageTitle" style="margin:0 0 6px;">New Article</h1>
        <div id="sessionText" style="color:#6b7280;">Checking admin session...</div>
      </div>
      <div style="display:flex; gap:12px;">
        <a href="./news.html" class="btn" style="text-decoration:none; color:inherit;">Back to News</a>
        <a href="./dashboard.html" class="btn" style="text-decoration:none; color:inherit;">Dashboard</a>
        <a href="./profile.html" class="btn" style="text-decoration:none; color:inherit;">Profile</a>
      </div>
    </div>

    <div id="message" class="message"></div>

    <form id="newsEditorForm" class="grid">
      <div class="card">
        <input type="hidden" id="articleId">
        <div class="field">
          <label for="titleInput">Title</label>
          <input id="titleInput" required>
        </div>
        <div class="field">
          <label for="excerptInput">Excerpt</label>
          <textarea id="excerptInput"></textarea>
        </div>
        <div class="field">
          <label for="contentInput">Content</label>
          <textarea id="contentInput" required></textarea>
        </div>
      </div>

      <div class="card">
        <div class="field">
          <label for="slugInput">Slug</label>
          <input id="slugInput" placeholder="auto-generated if left blank">
        </div>
        <div class="field">
          <label for="categoryInput">Category</label>
          <select id="categoryInput">
            <option value="">No category</option>
          </select>
        </div>
        <div class="field">
          <label for="categoryNameInput">Manage Categories</label>
          <input id="categoryNameInput" placeholder="Category name">
          <input id="categorySlugInput" placeholder="Slug (optional)" style="margin-top:8px;">
          <input type="hidden" id="categoryIdInput">
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button class="btn" type="button" id="saveCategoryBtn">Save Category</button>
            <button class="btn" type="button" id="resetCategoryBtn">Reset</button>
          </div>
          <div id="categoryList" style="margin-top:12px;"></div>
        </div>
        <div class="field">
          <label for="statusInput">Status</label>
          <select id="statusInput">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
          </select>
        </div>
        <div class="field">
          <label for="featuredImageInput">Featured Image URL</label>
          <input id="featuredImageInput" placeholder="https://...">
        </div>
        <div style="display:flex; gap:12px;">
          <button class="btn" type="submit" id="saveBtn">Save Article</button>
          <button class="btn" type="button" id="deleteBtn" style="display:none;">Delete</button>
        </div>
      </div>
    </form>
  </div>
  <script src="assets/js/api-base.js"></script>
  <script src="assets/js/admin-news-editor.js"></script>
</body>
</html>
