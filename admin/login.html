<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Preston Daub</title>
  <link rel="icon" type="image/png" href="../assets/img/logo/favicon.png">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #111827;
    }
    .card {
      width: min(420px, calc(100vw - 32px));
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    }
    .logo {
      max-width: 180px;
      display: block;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 24px;
      color: #6b7280;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #0b0ea8 0%, #1e40af 100%);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .message {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
    }
    .message.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="../assets/img/logo/logo.png" alt="Preston Daub Logo" class="logo">
    <h1>Sign in</h1>
    <p>Use your admin credentials to access the new Node dashboard.</p>
    <div id="message" class="message"></div>
    <form id="adminLoginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit" id="submitBtn">Login</button>
    </form>
  </div>
  <script src="assets/js/api-base.js"></script>
  <script src="assets/js/admin-auth.js"></script>
</body>
</html>
